<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — CampusConnect AI & MindMate AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <h1>Create Account</h1>
                <p>Join us and explore campus AI assistants</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('signup') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username"
                           placeholder="Choose a username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email"
                           placeholder="Enter your email" required>
                </div>

                <!-- Feature 10: Password field with strength meter -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Min. 6 characters" required minlength="6"
                           oninput="checkPasswordStrength(this.value)">
                    <!-- Strength bar -->
                    <div class="pw-strength-bar">
                        <div class="pw-strength-fill" id="pwStrengthFill"></div>
                    </div>
                    <span class="pw-strength-text" id="pwStrengthText"></span>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                           placeholder="Re-enter password" required
                           oninput="checkPasswordMatch()">
                    <span class="pw-strength-text" id="pwMatchText"></span>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
            </div>
        </div>
    </div>

    <script>
    function checkPasswordStrength(pw) {
        const fill = document.getElementById('pwStrengthFill');
        const text = document.getElementById('pwStrengthText');

        if (!pw) {
            fill.style.width = '0%';
            text.textContent = '';
            return;
        }

        let score = 0;
        if (pw.length >= 6)  score++;
        if (pw.length >= 10) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        const levels = [
            { pct: '20%', color: '#E27070', label: 'Very Weak' },
            { pct: '40%', color: '#E4A25A', label: 'Weak'      },
            { pct: '60%', color: '#E4C35A', label: 'Fair'      },
            { pct: '80%', color: '#5EBD8A', label: 'Strong'    },
            { pct: '100%',color: '#2E9E68', label: 'Very Strong'}
        ];

        const lvl = levels[Math.min(score - 1, 4)] || levels[0];
        fill.style.width = lvl.pct;
        fill.style.background = lvl.color;
        text.textContent = lvl.label;
        text.style.color = lvl.color;

        // Also check match if confirm field has value
        checkPasswordMatch();
    }

    function checkPasswordMatch() {
        const pw  = document.getElementById('password').value;
        const cpw = document.getElementById('confirm_password').value;
        const el  = document.getElementById('pwMatchText');
        if (!cpw) { el.textContent = ''; return; }
        if (pw === cpw) {
            el.textContent = 'Passwords match';
            el.style.color = '#5EBD8A';
        } else {
            el.textContent = 'Passwords do not match';
            el.style.color = '#E27070';
        }
    }
    </script>
</body>
</html>
